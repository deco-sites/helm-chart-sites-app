# Example override values for the eks-envs cluster (us-west-2 / nonprod)
# Usage: helm install <release> . -f values.yaml -f values-eks-nonprod.yaml
#        or via ArgoCD spec.source.helm.valueFiles

# -- Ingress via ingress-nginx (NLB internet-facing)
ingress:
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  tls: {}

# -- Certificate (cert-manager)
# External DNS manages only *.nonprod.deco.site (Zone: Z1014755BCS1NFI9M0NE)
certificate:
  issuerRef:
    name: decocms-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - <app-name>.nonprod.deco.site
    # For blue/green preview:
    # - <app-name>-preview.nonprod.deco.site

# -- Node selector: define in values-custom.yaml per app (e.g. node.deco/capacity-type, node.deco/arch)
nodeSelector: {}

# -- Tolerations: define in values-custom.yaml per app
tolerations: []

# -- External Secrets via ClusterSecretStore (provisioned by Terraform, do not create own SecretStore)
# IMPORTANT: remove from env.literals any keys fetched here to avoid precedence conflict.
env:
  enabled: true

# -- Extra pod volumes and container mounts (optional)
extraVolumes: []
extraVolumeMounts: []

# -- Liveness and readiness probe configuration
livenessProbe:
  path: /deco/_liveness
  initialDelaySeconds: 10
  periodSeconds: 4
  timeoutSeconds: 3
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  path: /deco/_liveness
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 1
  successThreshold: 1
  failureThreshold: 3

# -- Container lifecycle hooks (optional)
lifecycle: {}

# -- Container termination message settings (optional)
terminationMessagePath: ""
terminationMessagePolicy: ""

externalSecrets:
  enabled: true
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  externalSecret:
    refreshInterval: 1h
    data:
      - secretKey: OTEL_EXPORTER_OTLP_HEADERS
        remoteRef:
          key: nonprod/otel-config/general
          property: OTEL_EXPORTER_OTLP_HEADERS
      - secretKey: OTEL_SAMPLING_CONFIG
        remoteRef:
          key: nonprod/otel-config/general
          property: OTEL_SAMPLING_CONFIG
      - secretKey: DECO_CRYPTO_KEY
        remoteRef:
          key: nonprod/<app-name>/general
          property: DECO_CRYPTO_KEY
  useInDeployment: true
