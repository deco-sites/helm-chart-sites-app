{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "app-chart.fullname" . }}
  labels:
    {{- include "app-chart.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "app-chart.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    # - Egress
  ingress:
    # Permite tráfego de outros pods na mesma namespace
    {{- if .Values.networkPolicy.allowSameNamespace }}
    - from:
        - podSelector: {}
    {{- end }}
    # Permite tráfego das namespaces listadas em allowedIngressNamespaces
    {{- if .Values.networkPolicy.allowedIngressNamespaces }}
    - from:
        {{- range .Values.networkPolicy.allowedIngressNamespaces }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . | quote }}
        {{- end }}
    {{- end }}
  # egress:
  #   # Permite egress para kube-dns (kube-system) para resolução DNS
  #   - to:
  #       - namespaceSelector:
  #           matchLabels:
  #             kubernetes.io/metadata.name: kube-system
  #         podSelector:
  #           matchLabels:
  #             k8s-app: kube-dns
  #     ports:
  #       - protocol: UDP
  #         port: 53
  #       - protocol: TCP
  #         port: 53
{{- end }}
