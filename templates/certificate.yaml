apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certificate.name | default (include "app-chart.fullname" .) }}
  labels:
    {{- include "app-chart.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.certificate.secretName | default (printf "%s-tls" (include "app-chart.fullname" .)) }}
  issuerRef:
    name: {{ .Values.certificate.issuerRef.name }}
    kind: {{ .Values.certificate.issuerRef.kind | default "ClusterIssuer" }}
  dnsNames:
    {{- toYaml .Values.certificate.dnsNames | nindent 4 }}
  privateKey:
    algorithm: ECDSA
    size: 256    
