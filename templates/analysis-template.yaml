{{- if and (eq .Values.workload.type "argorollout") .Values.workload.analysisTemplate.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ include "app-chart.fullname" . }}-preview-check
  labels:
    {{- include "app-chart.labels" . | nindent 4 }}
spec:
  args:
  - name: preview-url
    # description: Preview service URL for health validation (HTTP 200)
  metrics:
  # Web provider: HTTP request made by the controller; success = HTTP 200 within timeout.
  # Avoids the Job provider bug where a failed Job still marked the AnalysisRun as Successful (issue #521).
  # failureLimit: 0 = no failures tolerated; timeout 30s.
  - name: preview-http-check
    failureLimit: 0
    successCondition: "true"
    provider:
      web:
        url: "{{ "{{" }} args.preview-url {{ "}}" }}"
        timeoutSeconds: {{ .Values.workload.analysisTemplate.timeoutSeconds | default 30 }}
{{- end }}
